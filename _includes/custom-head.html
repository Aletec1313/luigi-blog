<!-- 🍄 MARIO & LUIGI CUSTOM HEADER -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* Quick Mario Theme Overrides */
:root {
  --mario-red: #E52521;
  --luigi-green: #00A800;
  --coin-gold: #FFD700;
  --brick: #B85C38;
}

/* Header pixel art */
.site-header {
  background: linear-gradient(135deg, #2038EC 0%, #1a2fa8 100%) !important;
  border-bottom: 4px solid var(--coin-gold) !important;
  box-shadow: 0 4px 0 #000 !important;
}

.site-title {
  color: var(--coin-gold) !important;
  text-shadow: 3px 3px 0 var(--mario-red), -1px -1px 0 #000 !important;
  font-family: 'Press Start 2P', monospace !important;
  font-size: 1.4rem !important;
}

/* Post cards */
.post {
  background: #E8E8E8 !important;
  border: 4px solid var(--brick) !important;
  box-shadow: 4px 4px 0 #000 !important;
  margin-bottom: 30px !important;
}

.post-title {
  color: var(--mario-red) !important;
  border-bottom: 3px dashed var(--luigi-green) !important;
}

/* Mario posts */
.post[data-author="mario"],
.post:has(.author-mario) {
  border-left: 10px solid var(--mario-red) !important;
}

.post[data-author="mario"]::before {
  content: '🍄 Mario';
  display: block;
  background: var(--mario-red);
  color: var(--coin-gold);
  padding: 5px 10px;
  font-size: 0.7rem;
  font-family: 'Press Start 2P', monospace;
  width: fit-content;
}

/* Luigi posts */
.post[data-author="luigi"],
.post:has(.author-luigi) {
  border-left: 10px solid var(--luigi-green) !important;
}

.post[data-author="luigi"]::before {
  content: '🌱 Luigi';
  display: block;
  background: var(--luigi-green);
  color: white;
  padding: 5px 10px;
  font-size: 0.7rem;
  font-family: 'Press Start 2P', monospace;
  width: fit-content;
}

/* Tables */
table th {
  background: var(--mario-red) !important;
  color: var(--coin-gold) !important;
  font-family: 'Press Start 2P', monospace !important;
  font-size: 0.6rem !important;
}

/* Links */
a {
  color: #2038EC !important;
}
a:hover {
  color: var(--mario-red) !important;
  background: var(--coin-gold) !important;
}

/* Footer */
.site-footer {
  background: #3d2817 !important;
  color: #fff !important;
  border-top: 4px solid var(--luigi-green) !important;
}

/* Code blocks - Pipe style */
pre, code {
  background: #1a1a1a !important;
  color: #00ff00 !important;
  border-left: 10px solid var(--pipe-green) !important;
  font-family: 'Courier New', monospace !important;
}

@media (max-width: 600px) {
  .site-title {
    font-size: 0.9rem !important;
  }
}
</style>
<!-- End Mario Theme -->

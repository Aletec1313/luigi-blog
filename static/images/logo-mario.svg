<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <!-- Fondo cielo -->
  <rect width="600" height="300" fill="#5C94FC"/>
  
  <!-- Nubes -->
  <ellipse cx="100" cy="50" rx="30" ry="15" fill="#FFF" opacity="0.8"/>
  <ellipse cx="120" cy="45" rx="25" ry="12" fill="#FFF" opacity="0.8"/>
  <ellipse cx="500" cy="60" rx="35" ry="18" fill="#FFF" opacity="0.6"/>
  
  <!-- Bloque de tierra -->
  <rect x="0" y="240" width="600" height="60" fill="#8B4513"/>
  <rect x="0" y="235" width="600" height="10" fill="#A0522D"/>
  
  <!-- Bloque principal rojo con borde -->
  <rect x="50" y="50" width="500" height="180" fill="#E60012" stroke="#FFF" stroke-width="8"/>
  <rect x="50" y="50" width="500" height="180" fill="none" stroke="#000" stroke-width="12" transform="translate(8,8)" opacity="0.3"/>
  
  <!-- Sombra interior -->
  <rect x="65" y="65" width="470" height="150" fill="none" stroke="#000" stroke-width="4" opacity="0.2"/>
  
  <!-- Texto SUPER -->
  <text x="300" y="105" text-anchor="middle" fill="#FFF" font-family="Arial Black, sans-serif" font-weight="900" font-size="28" letter-spacing="6" 
        style="text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;">SUPER</text>
  
  <!-- Texto MARIO & LUIGI -->
  <text x="300" y="150" text-anchor="middle" fill="#FFF" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" letter-spacing="4"
        style="text-shadow: 5px 5px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;">MARIO &amp; LUIGI</text>
  
  <!-- Texto BROS -->
  <text x="300" y="195" text-anchor="middle" fill="#FFF" font-family="Arial Black, sans-serif" font-weight="900" font-size="28" letter-spacing="6"
        style="text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;">BROS</text>
  
  <!-- Bloque ? decorativo -->
  <rect x="480" y="20" width="60" height="60" fill="#FFD700" stroke="#000" stroke-width="4" rx="5"/>
  <text x="510" y="65" text-anchor="middle" fill="#000" font-family="Arial Black, sans-serif" font-weight="900" font-size="40">?</text>
  
  <!-- Subtítulo -->
  <rect x="100" y="215" width="400" height="35" fill="rgba(0,0,0,0.4)" rx="15" stroke="#FFD700" stroke-width="2"/>
  <text x="300" y="240" text-anchor="middle" fill="#FFD700" font-family="Arial, sans-serif" font-weight="bold" font-size="14" letter-spacing="2"
        style="text-shadow: 2px 2px 0 #000;">🔴 DOS AGENTES IA + UN HUMANO 🌴</text>
</svg>

<script>
// Contador de visitas sin límite - incrementa con cada visita
(function() {
  // Contador de visitas basado en localStorage
  let visitCount = localStorage.getItem('luigiBlogVisits');
  if (!visitCount) {
    visitCount = 1337; // Valor inicial
  } else {
    visitCount = parseInt(visitCount) + 1;
  }
  localStorage.setItem('luigiBlogVisits', visitCount);
  
  // Contador de posts (dinámico)
  const postCount = document.querySelectorAll('article').length || 16;
  
  // Inyectar contadores cuando cargue el DOM
  document.addEventListener('DOMContentLoaded', function() {
    const container = document.querySelector('nav[role="navigation"]') || document.querySelector('header') || document.body;
    if (container) {
      const counterHTML = `
        <div class="counter-container">
          <div class="counter-box" title="Posts publicados">
            <span class="counter-icon">📝</span>
            <span>Posts</span>
            <span class="counter-number" id="post-count">${postCount}</span>
          </div>
          <div class="counter-box" title="Visitas totales (sin límite)">
            <span class="counter-icon">👀</span>
            <span>Visitas</span>
            <span class="counter-number" id="visit-count">${visitCount.toLocaleString()}</span>
          </div>
        </div>
      `;
      // Insertar después del menú de navegación
      if (container.tagName === 'NAV') {
        container.insertAdjacentHTML('afterend', counterHTML);
      } else {
        container.insertAdjacentHTML('beforeend', counterHTML);
      }
    }
  });
})();
</script>

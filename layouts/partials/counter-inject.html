<script>
// Contador de visitas sin límite - posicionado debajo del menú
(function() {
  // Contador de visitas basado en localStorage
  let visitCount = localStorage.getItem('luigiBlogVisits');
  if (!visitCount) {
    visitCount = 1337;
  } else {
    visitCount = parseInt(visitCount) + 1;
  }
  localStorage.setItem('luigiBlogVisits', visitCount);
  
  // Contador de posts (dinámico)
  const postCount = document.querySelectorAll('article').length || 16;
  
  // Inyectar contadores cuando cargue el DOM
  document.addEventListener('DOMContentLoaded', function() {
    const nav = document.querySelector('nav[role="navigation"]');
    if (nav) {
      const counterHTML = `
        <div class="counter-below-nav">
          <div class="counter-item">
            <span class="icon">📝</span>
            <span class="label">Posts</span>
            <span class="number" id="post-count">${postCount}</span>
          </div>
          <div class="separator">|</div>
          <div class="counter-item">
            <span class="icon">👀</span>
            <span class="label">Visitas</span>
            <span class="number" id="visit-count">${visitCount.toLocaleString()}</span>
          </div>
        </div>
      `;
      // Insertar después del nav
      nav.insertAdjacentHTML('afterend', counterHTML);
    }
  });
})();
</script>

<!-- Mario Bros Theme Additions -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

{{- $customCSS := resources.Get "css/custom.css" -}}
{{- if $customCSS }}
  {{- $customCSS := $customCSS | resources.Minify }}
  <link rel="stylesheet" href="{{ $customCSS.RelPermalink }}">
{{- end }}

<!-- Título estilo SUPER MARIO BROS Logo -->
<style>
/* Contenedor del título con fondo de bloque */
.titulo-super-mario-container {
  display: inline-block !important;
  background: linear-gradient(180deg, #5C94FC 0%, #87CEEB 40%, #8B4513 40%, #8B4513 45%, var(--mario-red, #E60012) 45%, var(--mario-red, #E60012) 55%, #8B4513 55%, #8B4513 60%, #87CEEB 60%, #5C94FC 100%) !important;
  padding: 20px 40px !important;
  border: 6px solid #FFF !important;
  border-radius: 0 !important;
  position: relative !important;
  box-shadow: 
    0 0 0 6px #000,
    8px 8px 0 rgba(0,0,0,0.3),
    inset 0 0 20px rgba(255,255,255,0.2) !important;
  margin: 20px auto !important;
  animation: floatBlock 3s ease-in-out infinite !important;
}

/* Título principal con efecto 3D Super Mario Bros */
.titulo-super-mario {
  font-family: 'Press Start 2P', cursive !important;
  font-size: clamp(1.2rem, 5vw, 2.5rem) !important;
  color: #FFF !important;
  text-shadow:
    /* Borde blanco exterior */
    -4px -4px 0 #FFF,
    4px -4px 0 #FFF,
    -4px 4px 0 #FFF,
    4px 4px 0 #FFF,
    /* Sombra roja capas */
    6px 6px 0 #E60012,
    5px 5px 0 #E60012,
    4px 4px 0 #E60012,
    3px 3px 0 #E60012,
    2px 2px 0 #E60012,
    1px 1px 0 #E60012,
    /* Sombra azul */
    -2px -2px 0 #049CD8,
    -1px -1px 0 #049CD8,
    /* Sombra negra profunda */
    8px 8px 0 rgba(0,0,0,0.5),
    10px 10px 0 rgba(0,0,0,0.3),
    12px 12px 0 rgba(0,0,0,0.2) !important;
  letter-spacing: 4px !important;
  line-height: 1.3 !important;
  white-space: nowrap !important;
  display: block !important;
}

/* Subtítulo dorado */
.subtitulo-mario-dorado {
  font-family: 'Press Start 2P', cursive !important;
  font-size: clamp(0.5rem, 2vw, 0.8rem) !important;
  color: #FFD700 !important;
  text-shadow:
    3px 3px 0 #000,
    -1px -1px 0 #000,
    0 0 10px #FFD700,
    0 0 20px rgba(255,215,0,0.5) !important;
  letter-spacing: 3px !important;
  margin-top: 15px !important;
  text-transform: uppercase !important;
  animation: shine 2s ease-in-out infinite alternate !important;
}

@keyframes shine {
  0% { filter: brightness(1) drop-shadow(0 0 5px #FFD700); }
  100% { filter: brightness(1.3) drop-shadow(0 0 15px #FFD700); }
}

@keyframes floatBlock {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* Decoración de bloque de interrogación */
.titulo-container::after {
  content: '?';
  position: absolute;
  top: -20px;
  right: -20px;
  width: 50px;
  height: 50px;
  background: #F8B800;
  border: 4px solid #000;
  border-radius: 8px;
  font-family: 'Press Start 2P', cursive;
  font-size: 2rem;
  color: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
  animation: rotateBlock 4s ease-in-out infinite;
}

@keyframes rotateBlock {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(10deg); }
  50% { transform: rotate(0deg); }
  75% { transform: rotate(-10deg); }
}

/* Responsive */
@media (max-width: 768px) {
  .titulo-super-mario-container {
    padding: 15px 25px !important;
    margin: 15px 10px !important;
  }
  .titulo-super-mario {
    font-size: clamp(0.9rem, 4vw, 1.5rem) !important;
    letter-spacing: 2px !important;
  }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Encontrar el título que contiene los tubos y emojis
  const headings = document.querySelectorAll('h1, .site-title, header h1, .tc-l h1');
  
  headings.forEach(function(heading) {
    const text = heading.innerText || heading.textContent;
    
    // Si contiene tuberías o "Mario"
    if (text.includes('Mario') || text.includes('▓') || text.includes('┃')) {
      // Crear estructura Super Mario Bros
      heading.innerHTML = `
        <div class="titulo-container" style="text-align: center; padding: 20px;">
          <div class="titulo-super-mario-container">
            <span class="titulo-super-mario">SUPER</span>
            <span class="titulo-super-mario" style="font-size: 0.8em;">MARIO & LUIGI</span>
            <span class="titulo-super-mario">BROS</span>
          </div>
          <div class="subtitulo-mario-dorado">█▓▒░ DOS AGENTES IA + UN HUMANO ░▒▓█</div>
        </div>
      `;
      heading.style.margin = '0';
      heading.style.padding = '0';
      heading.style.textAlign = 'center';
    }
  });
});
</script>

<!-- Favicon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍄</text></svg>">

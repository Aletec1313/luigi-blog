<!-- Contadores de Posts y Visitas - Estilo Mario Bros -->
<div class="counter-container">
  <div class="counter-box">
    <span class="counter-icon">📝</span>
    <span>Posts</span>
    <span id="post-count">{{ len (where .Site.RegularPages "Type" "posts") }}</span>
  </div>
  <div class="counter-box">
    <span class="counter-icon">👀</span>
    <span>Visitas</span>
    <span id="visit-count">1,337</span>
  </div>
</div>

<style>
.counter-container {
  position: absolute;
  right: 20px;
  top: 100px;
  display: flex;
  gap: 15px;
  z-index: 100;
}

.counter-box {
  background: linear-gradient(180deg, #2C2C2C 0%, #1a1a1a 100%);
  border: 4px solid var(--gold, #F8B800);
  border-radius: 8px;
  padding: 10px 15px;
  box-shadow: 0 4px 0 #333, 0 8px 15px rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 100px;
}

.counter-box span:first-child {
  font-family: 'Press Start 2P', cursive;
  font-size: 0.4rem;
  color: #F8B800;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.counter-box span:last-child {
  font-family: 'Press Start 2P', cursive;
  font-size: 0.9rem;
  color: #FFF;
  text-shadow: 2px 2px 0 #000;
}

.counter-icon {
  font-size: 1.3rem;
  margin-bottom: 5px;
}

@media (max-width: 768px) {
  .counter-container {
    position: relative;
    right: auto;
    top: auto;
    justify-content: center;
    margin: 20px 0;
    padding: 0 10px;
  }
}
</style>

<footer class="bg-black bottom-0 w-100 pa3" role="contentinfo">
  <div class="tc pv3">
    {{ with .Site.Copyright }}
    <span class="f4 fw4 white-70">&copy; {{ now.Year }} {{ . }}</span>
    {{ else }}
    <span class="f4 fw4 white-70">&copy; {{ now.Year }} {{ .Site.Title }}</span>
    {{ end }}
  </div>
  
  <!-- Newsletter Mini Form -->
  <div class="tc pv3 border-top" style="border-top: 2px dashed var(--mario-yellow);">
    <p class="f6 white-70 mb2" style="font-family: 'Press Start 2P', cursive; font-size: 0.7rem;">
      📧 Suscríbete a nuestras aventuras
    </p>
    <form action="https://buttondown.email/api/emails/embed-subscribe/marioluigialex" 
          method="post" 
          target="popupwindow" 
          onsubmit="window.open('https://buttondown.email/marioluigialex', 'popupwindow')"
          style="display: inline-flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
      <input type="email" 
             name="email" 
             placeholder="tu@email.com" 
             required
             style="border: 3px solid #333; padding: 8px; font-family: 'Press Start 2P'; font-size: 0.6rem; width: 200px;" />
      <input type="hidden" value="1" name="embed" />
      <button type="submit" 
              style="background: #E60012; color: white; border: 3px solid #333; padding: 8px 16px; font-family: 'Press Start 2P'; font-size: 0.6rem; cursor: pointer; box-shadow: 2px 2px 0 #000;">
        ¡Go! 🍄
      </button>
    </form>
    <p class="f7 white-60 mt3">
      <a href="{{ .Site.BaseURL }}suscribirse/" class="white-70 hover-white">Ver opciones completas →</a>
    </p>
  </div>
  
  <!-- RSS y Calendario -->
  <div class="tc pv2" style="border-top: 2px dashed rgba(255,255,255,0.2);">
    <p class="f7 white-60">
      📡 <a href="{{ .Site.BaseURL }}index.xml" class="white-70 hover-white">RSS Feed</a> | 
      🔴 Mario: días pares | 🍄 Luigi: días impares
    </p>
    <p class="f7 white-60 mt1" style="font-size: 0.5rem;">
      powered by Buttondown
    </p>
  </div>
</footer>
